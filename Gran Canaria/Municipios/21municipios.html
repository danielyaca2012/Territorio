<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Juego de municipios – Gran Canaria</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  body { margin:0; font-family: Arial, Helvetica, sans-serif; }
  #top { padding:10px; background:#0b7; color:#042; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  #map { height:75vh; width:100%; }

.boton-volver {
  margin-left: auto;           /* lo empuja a la derecha */
  background: #fff;
  color: #042;
  font-weight: bold;
}

.boton-volver:hover {
  background: #e6f7f3;
}
  
  button { padding:8px 12px; border-radius:6px; border:1px solid #999; cursor:pointer; }
  #nucleo { font-weight:bold; font-size:1.2rem; }
  #mensaje {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 3rem;
    font-weight: bold;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 20px 40px;
    border-radius: 12px;
    display: none;
    z-index: 1000;
    text-align: center;
  }
</style>
</head>
<body>

<div id="top">
  <button id="start">Iniciar</button>
  <button id="repaso">Repaso</button>
  <span id="progreso">—/—</span>
  <span id="nucleo">—</span>
  <span id="fallos">Fallos: 0</span>
   <button class="boton-volver" onclick="volverInicio()">⬅ Volver al menú principal</button>
</div>

<div id="mensaje"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// =====================
// Municipios de Lanzarote
// =====================
const municipios = [
  {name:"Agaete", lat:28.10085, lng:-15.69573, umbral:1000},
  {name:"Gáldar", lat:28.14437, lng:-15.65100, umbral:1000},
  {name:"Santa María de Guía", lat:28.13917, lng:-15.63278, umbral:1000},
  {name:"Arucas", lat:28.11972, lng:-15.52426, umbral:1000},
  {name:"Firgas", lat:28.10600, lng:-15.56278, umbral:1000},
  {name:"Moya", lat:28.11056, lng:-15.58278, umbral:1000},
  {name:"Teror", lat:28.06056, lng:-15.54639, umbral:1000},
  {name:"Valleseco", lat:28.04389, lng:-15.57389, umbral:1000},
  {name:"Artenara", lat:28.02000, lng:-15.64639, umbral:1000},
  {name:"Tejeda", lat:27.99500, lng:-15.61500, umbral:1000},
  {name:"Valsequillo", lat:27.99139, lng:-15.49778, umbral:1000},
  {name:"Las Palmas de Gran Canaria", lat:28.12355, lng:-15.43626, umbral:1000},
  {name:"Telde", lat:28.00371, lng:-15.41343, umbral:1000},
  {name:"Ingenio", lat:27.91855, lng:-15.43494, umbral:1000},
  {name:"Agüimes", lat:27.90539, lng:-15.44609, umbral:1000},
  {name:"Santa Lucía de Tirajana", lat:27.91278, lng:-15.54028, umbral:1000},
  {name:"Santa Brígida", lat:28.033874791803807, lng:-15.498531334115938, umbral:1000},
  {name:"San Bartolomé de Tirajana", lat:27.92428, lng:-15.57300, umbral:1000},
  {name:"Mogán", lat:27.88370, lng:-15.72398, umbral:1000},
  {name:"La Aldea de San Nicolás", lat:27.98333, lng:-15.78139, umbral:1000},
  {name:"Vega de San Mateo", lat:28.01083, lng:-15.53250, umbral:1000}
];

// =====================
// Inicialización del mapa
// =====================
let map = L.map('map').setView([27.98741774248388, -15.59796808721328], 11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

let order = [];
let index = -1;
let fallosTotales = 0;
let fallosActual = 0;
let zonas = [];
let aciertoActual = false;

// Mezclar array
function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// Mostrar mensaje central
function mostrarMensaje(texto, tipo){
  const msg = document.getElementById("mensaje");
  msg.textContent = texto;
  msg.style.backgroundColor = tipo === "correcto" ? "rgba(0,128,0,0.7)" : "rgba(200,0,0,0.7)";
  msg.style.display = "block";
  setTimeout(() => { 
    msg.style.display = "none"; 
    if(tipo==="correcto") {
      index++;          // pasar a siguiente pregunta
      nextRound();
    }
  }, 1500);
}

// Iniciar juego
document.getElementById("start").onclick = () => {
  municipios.forEach(m => delete m.colorAcertado);
  clearMap();
  order = shuffle([...municipios]);
  index = 0;
  fallosTotales = 0;
  fallosActual = 0;
  document.getElementById("fallos").textContent = `Fallos: ${fallosTotales}`;
  nextRound();
};

document.getElementById("repaso").onclick = () => {
  clearMap();
  document.getElementById("nucleo").textContent = "Modo repaso";
  document.getElementById("progreso").textContent = "-/-";

  municipios.forEach(municipio => {
    const circle = L.circle([municipio.lat, municipio.lng], {
      radius: municipio.umbral,
      color: 'blue',
      fillOpacity: 0.2
    }).addTo(map);

    // Mostrar nombre SIEMPRE
    circle.bindTooltip(municipio.name, {
      permanent: true,
      direction: "top"
    });

    zonas.push(circle);
  });
};

// Preparar siguiente municipio
function nextRound(){
  clearMap();
  aciertoActual = false;
  fallosActual = 0;

  if(index >= order.length){
    document.getElementById("nucleo").textContent = "✔ Juego completado";
    document.getElementById("progreso").textContent = `${order.length}/${order.length}`;
    return;
  }

  document.getElementById("nucleo").textContent = order[index].name;
  document.getElementById("progreso").textContent = `${index+1}/${order.length}`;

  zonas = [];
  municipios.forEach(municipio => {
    let colorInicial = municipio.colorAcertado ? municipio.colorAcertado : 'blue';
    const circle = L.circle([municipio.lat, municipio.lng], {
      radius: municipio.umbral,
      color: colorInicial,
      fillOpacity: 0.2
    }).addTo(map);

    if(municipio.colorAcertado){
      circle.bindTooltip(municipio.name, {permanent: false, direction: "top"});
    }

    circle.on("click", () => {
      if(aciertoActual) return;

      if(municipio.name === order[index].name){
        aciertoActual = true;
        if(fallosActual === 0){
          municipio.colorAcertado = 'green';
          circle.setStyle({color:'green', fillOpacity:0.4});
        } else {
          municipio.colorAcertado = 'orange';
          circle.setStyle({color:'orange', fillOpacity:0.4});
        }
        circle.bindTooltip(municipio.name, {permanent: false, direction: "top"});
        mostrarMensaje("Correcto ✅", "correcto");

      } else {
        fallosTotales++;
        fallosActual++;
        document.getElementById("fallos").textContent = `Fallos: ${fallosTotales}`;
        circle.setStyle({color:'red', fillOpacity:0.3});
        mostrarMensaje("Incorrecto ❌", "incorrecto");
      }
    });

    zonas.push(circle);
  });
}
function volverInicio(){
  window.location.href = "/Territorio/index.html";
}
// Limpiar mapa
function clearMap(){
  zonas.forEach(c => map.removeLayer(c));
  zonas = [];
}
</script>

</body>
</html>
