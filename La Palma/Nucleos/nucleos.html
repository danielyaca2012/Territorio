<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<title>Juego de núcleos poblacionales – La Palma</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html,body{
height:100%;
margin:0;
font-family:Arial,Helvetica,sans-serif;
}

#top{
padding:10px;
background:#0b7;
color:#042;
display:flex;
gap:12px;
align-items:center;
flex-wrap:wrap;
}

#map{
height:calc(100vh - 80px);
width:100%;
}

button{
padding:6px 10px;
border-radius:6px;
border:1px solid #999;
cursor:pointer;
}

.boton-volver{
margin-left:auto;
background:white;
font-weight:bold;
}

.boton-volver:hover{
background:#eef;
}

#nucleo{
font-size:1.2rem;
font-weight:bold;
}

#mensaje,#estadisticas{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:rgba(0,0,0,.75);
color:white;
padding:25px 35px;
border-radius:12px;
display:none;
z-index:1000;
text-align:center;
}

#mensaje{
font-size:3rem;
}

</style>

</head>

<body>

<div id="top">

<button id="start">Iniciar</button>

<button id="repaso">Modo repaso</button>

<span id="progreso">—/—</span>

<span id="nucleo">—</span>

<span id="fallos">Fallos: 0</span>

<button class="boton-volver" onclick="volverInicio()">⬅ Volver al menú principal</button>

</div>

<div id="mensaje"></div>

<div id="estadisticas"></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map=L.map("map").setView([28.68,-17.87],11);

L.tileLayer(
"https://{s}.basemaps.cartocdn.com/rastertiles/voyager_nolabels/{z}/{x}/{y}{r}.png"
).addTo(map);

setTimeout(()=>map.invalidateSize(),200);

let nucleos=[];
let order=[];
let index=0;
let fallosTotales=0;
let fallosActual=0;
let aciertoActual=false;
let juegoTerminado=false;
let modoRepaso=false;
let fallados=[];
let juegoIniciado=false;

fetch("nucleos.geojson")
.then(r=>r.json())
.then(data=>{

const grupos={};

L.geoJSON(data,{
const capa = L.geoJSON(data,{

style:{
    color:"blue",
    weight:2,
    fillColor:"#6da8ff",
    fillOpacity:0.35
},

onEachFeature:(feature,layer)=>{

    const nombre=feature.properties.ENTIDAD;

    if(!nombre || nombre==="DISEMINADO") return;

    if(!grupos[nombre]){

        grupos[nombre]={
            ref:nombre,
            layer:[],
            colorAcertado:null,
            activa:true
        };

        nucleos.push(grupos[nombre]);
    }

    grupos[nombre].layer.push(layer);

    layer.on("click",()=>manejarClick(grupos[nombre]));
}

}).addTo(map);

map.fitBounds(capa.getBounds());

order=shuffle(nucleos);

});

document.getElementById("start").onclick=()=>{
salirRepaso();

juegoIniciado=true;
modoRepaso=false;
juegoTerminado=false;

ocultarEstadisticas();

nucleos.forEach(n=>{

n.colorAcertado=null;

n.layer.forEach(l=>{

l.unbindTooltip();
l.closeTooltip();

l.setStyle({

color:"blue",
weight:2,
fillColor:"#6da8ff",
fillOpacity:0.35

});

});

});

order=shuffle([...nucleos]);
  order = order.filter(n => n.layer.length > 0);

index=0;
fallosTotales=0;

document.getElementById("fallos").textContent="Fallos: 0";

nextRound();

};

document.getElementById("repaso").onclick=()=>{

modoRepaso=true;
juegoTerminado=true;

nucleos.forEach(n=>{

n.layer.forEach(l=>{

l.setStyle({
fillOpacity:.35,
opacity:1
});

l.bindTooltip(n.ref,{
    sticky:true
});

});

});

document.getElementById("nucleo").textContent="Modo repaso";
document.getElementById("progreso").textContent="";

};

function nextRound(){

aciertoActual=false;
fallosActual=0;
fallados=[];

if(index>=order.length){

juegoTerminado=true;

mostrarEstadisticas();

activarRepasoFinal();

return;

}

document.getElementById("nucleo").textContent=order[index].ref;

document.getElementById("progreso").textContent=(index+1)+"/"+order.length;

}

function manejarClick(n){

if(juegoTerminado) return;

if(modoRepaso) return;

if(aciertoActual) return;

if(n.ref===order[index].ref){

aciertoActual=true;

fallados.forEach(f=>{

if(!f.colorAcertado){

f.layer.forEach(l=>{

l.setStyle({

color:"blue",
weight:2,
fillColor:"#6da8ff",
fillOpacity:.35

});

});

}

});

n.colorAcertado=(fallosActual===0)?"green":"orange";

n.layer.forEach(l=>{

l.setStyle({

color:n.colorAcertado,
weight:3,
fillColor:n.colorAcertado,
fillOpacity:.55

});

});

mostrarMensaje("✔");

}

else{

fallosTotales++;
fallosActual++;

document.getElementById("fallos").textContent=
"Fallos: "+fallosTotales;

n.layer.forEach(l=>{

l.setStyle({

color:"red",
weight:3,
fillColor:"red",
fillOpacity:.55

});

});

if(!fallados.includes(n))
fallados.push(n);

}

}

function mostrarMensaje(txt){

const m=document.getElementById("mensaje");

m.textContent=txt;

m.style.display="block";

setTimeout(()=>{

m.style.display="none";

index++;

nextRound();

},800);

}

function mostrarEstadisticas(){

const verdes=nucleos.filter(n=>n.colorAcertado==="green").length;

const naranjas=nucleos.filter(n=>n.colorAcertado==="orange").length;

estadisticas.innerHTML=`

<h2>📊 Resultados</h2>

Fallos totales: ${fallosTotales}<br>

Perfectos: ${verdes}<br>

Con errores: ${naranjas}

`;

estadisticas.style.display="block";

}

function ocultarEstadisticas(){

estadisticas.style.display="none";

}

function activarRepasoFinal(){

nucleos.forEach(n=>{

n.layer.forEach(l=>{

l.bindTooltip(n.ref,{

permanent:true,

direction:"center"

});

});

});

}
function shuffle(a){

for(let i=a.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[a[i],a[j]]=[a[j],a[i]];

}

return a;

}

function volverInicio(){

window.location.href="/Territorio/index.html";

}

/* =====================
   ATAJOS DE TECLADO
===================== */

document.addEventListener("keydown",e=>{

if(e.key==="Escape"){

ocultarEstadisticas();

}

if(e.key==="r" || e.key==="R"){

document.getElementById("repaso").click();

}

if(e.key==="i" || e.key==="I"){

document.getElementById("start").click();

}

});

/* =====================
   AJUSTAR MAPA
===================== */

window.addEventListener("resize",()=>{

setTimeout(()=>map.invalidateSize(),100);

});

/* =====================
   DESACTIVAR DOBLE CLIC
===================== */

map.doubleClickZoom.disable();

/* =====================
   CURSOR
===================== */

map.getContainer().style.cursor="pointer";

  /* =====================
   CERRAR REPASO SI SE INICIA DE NUEVO
===================== */

function salirRepaso(){

if(!modoRepaso) return;

modoRepaso=false;

nucleos.forEach(n=>{

n.layer.forEach(l=>{

l.unbindTooltip();

l.setStyle({

color:"blue",
weight:2,
fillColor:"#6da8ff",
fillOpacity:.35

});

});

});

}

document.getElementById("start").addEventListener("click",salirRepaso);

/* =====================
   FIN DEL SCRIPT
===================== */

</script>

</body>

</html>
